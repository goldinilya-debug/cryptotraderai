services:
  - type: web
    name: cryptotraderai-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: BINGX_SANDBOX
        value: "true"
      - key: WEBHOOK_SECRET
        generateValue: true
