services:
  # Main API (FastAPI backend)
  - type: web
    name: cryptotraderai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # Frontend (Next.js)
  - type: web
    name: cryptotraderai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_API_URL
        value: https://cryptotraderai-api.onrender.com

  # Bot Runner (smc_bot + signal_monitor as asyncio background tasks)
  - type: web
    name: cryptotraderai-bots
    runtime: python
    rootDir: trading-bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn runner:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAIN_API_URL
        value: https://cryptotraderai-api.onrender.com
      - key: ML_API_URL
        value: https://cryptotraderai-ml.onrender.com

  # ML Signal Service (self-learning)
  - type: web
    name: cryptotraderai-ml
    runtime: python
    rootDir: ml-system
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAIN_API_URL
        value: https://cryptotraderai-api.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
